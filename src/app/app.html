@if(!introShowed){
  <app-intro-cutscene></app-intro-cutscene>
}
@if (!logged && introShowed) {
  <app-login></app-login>
}
@if (logged) {
  <app-menu-header></app-menu-header>
  @if(displayDevice){
    <app-select-device></app-select-device>
  }@else {
    <app-dashboard></app-dashboard>
  }
  
  <app-menu-bottom></app-menu-bottom>
}
